  <style>
    /* 全域背景設定 (明亮馬卡龍漸層) */
    body { 
      background: linear-gradient(135deg, #fce7f3 0%, #e0e7ff 50%, #dbeafe 100%);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;

    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(24bcfe, 0.05); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #fbcfe8; border-radius: 10px; border: 2px solid white; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #f472b6; }
    
    /* 動畫效果 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }

    .animate-float { animation: float 4s ease-in-out infinite; }

<body>

  <!-- 遊戲渲染容器 -->
  <div id="root" class="w-full h-full flex justify-center items-center p-2 sm:p-6"></div>

  <!-- 遊戲邏輯與元件 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // 音效系統 (Web Audio API)
    // ==========================================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const playTone = (freq, type, duration, vol=0.1) => {
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    };

    const sfx = {
      click: () => playTone(600, 'sine', 0.1, 0.03),
      success: () => {
        playTone(523.25, 'sine', 0.1, 0.05);
        setTimeout(() => playTone(659.25, 'sine', 0.2, 0.05), 100);
        setTimeout(() => playTone(783.99, 'sine', 0.3, 0.05), 200);
      },
      error: () => {
        playTone(300, 'triangle', 0.2, 0.05);
        setTimeout(() => playTone(250, 'triangle', 0.3, 0.05), 150);
      },
      timeout: () => playTone(200, 'square', 0.5, 0.05),
      tick: () => playTone(800, 'sine', 0.05, 0.01)
    };

    // ==========================================
    // 圖示與動態角色 SVG (明亮可愛版)
    // ==========================================

    const Heart = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>;
    
    // K 的大頭貼 (移除擋眼瀏海、改為淺藍髮色)

      return (

        options: [
          { text: '「這就是你考前一直玩遊戲的下場啊，早知如此何必當初。」', score: -10, resultEmotion: 'angry', feedback: '【缺乏同理】在對方最脆弱時落井下石（即使你說的是實話），會嚴重破壞關係。' },
          { text: '遞衛生紙給他：「考差了真的很嘔，先哭一下沒關係。」', score: 10, resultEmotion: 'happy', feedback: '【先處理情緒】先接住對方的情緒，等他冷靜後再來討論原因，才是良好的陪伴。' },
          { text: '「好啦別哭了，下次考好就好啦。」', score: -5, resultEmotion: 'neutral', feedback: '【輕忽感受】急於終止對方的悲傷，沒有給予足夠的情緒支持。' }
        ]
      },
      {
        id: 15, emotion: 'happy',
        situation: '你們去吃大餐，結帳時你才發現忘記帶錢包。這頓飯滿貴的，而你知道 K 最近手頭很緊。K 說：「沒關係，我先幫你墊吧。」',
        options: [
          { text: '「太感謝了！下次換我請你！」', score: -5, resultEmotion: 'awkward', feedback: '【金錢界線】雖然 K 答應代墊，但對手頭緊的他來說可能是一筆不小的壓力。' },
          { text: '「不好意思... 還是你等我一下，我馬上請家人/朋友匯款給我用手機付。」', score: 10, resultEmotion: 'happy', feedback: '【體貼入微】考量到對方的經濟狀況，主動尋求其他解決方案，展現極高的人際體貼！' },
          { text: '「好兄弟！那這頓就當你請客囉！」', score: -15, resultEmotion: 'angry', feedback: '【佔人便宜】嚴重侵犯財務界線，將別人的善意視為理所當然。' }
        ]
      }
    ];

    const INITIAL_TIME = 10;
    const START_SCORE = 50;
    const MAX_SCORE = 100;
    const PASS_SCORE = 80;

    // ==========================================
    // 主遊戲組件 App
    // ==========================================
    function App() {
      const [gameState, setGameState] = useState('start');
      const [qIndex, setQIndex] = useState(0);
      const [score, setScore] = useState(START_SCORE);
      const [timeLeft, setTimeLeft] = useState(INITIAL_TIME);
      const [feedback, setFeedback] = useState(null);
      const [currentEmotion, setCurrentEmotion] = useState('neutral');

      // 計時器邏輯
      useEffect(() => {
        let timer;
        if (gameState === 'playing' && timeLeft > 0) {
          timer = setInterval(() => {
            setTimeLeft(prev => {
              if (prev <= 4 && prev > 1) sfx.tick(); 
              return prev - 1;
            });
          }, 1000);
        } else if (gameState === 'playing' && timeLeft === 0) {
          handleTimeout();
        }
        return () => clearInterval(timer);
      }, [timeLeft, gameState]);

      useEffect(() => {
        if (gameState === 'playing') {
          setCurrentEmotion(questions[qIndex].emotion);
        }
      }, [qIndex, gameState]);

      const startGame = () => {
        sfx.click();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        setGameState('playing');
        setQIndex(0);
        setScore(START_SCORE);
        setTimeLeft(INITIAL_TIME);
        setFeedback(null);
      };

      const handleAnswer = (option) => {
        if (gameState !== 'playing') return;
        const isCorrect = option.score > 0;
        isCorrect ? sfx.success() : sfx.error();
        
        setScore(prev => Math.min(Math.max(prev + option.score, 0), MAX_SCORE));
        setCurrentEmotion(option.resultEmotion);
        
        setFeedback({
          text: option.feedback,
          type: isCorrect ? 'success' : 'error',
          delta: option.score
        });
        setGameState('feedback');
      };

      const handleTimeout = () => {
        sfx.timeout();
        setScore(prev => Math.max(prev - 10, 0));
        setCurrentEmotion('awkward');
        setFeedback({
          text: '你猶豫太久了，現場氣氛降到冰點，K 覺得有點尷尬...',
          type: 'timeout',
          delta: -10
        });
        setGameState('feedback');
      };

      const nextQuestion = () => {
        sfx.click();
        if (qIndex < questions.length - 1) {
          setQIndex(prev => prev + 1);
          setTimeLeft(INITIAL_TIME);
          setGameState('playing');
          setFeedback(null);
        } else {
          setGameState('end');
        }
      };

      // 頂部狀態列 UI (明亮風格)
      const TopBar = () => (
        <div className="w-full p-4 flex justify-between items-center bg-white/90 backdrop-blur-md z-20 border-b-2 border-pink-100 shadow-sm">
          <div className="flex items-center gap-4">
            <div className="bg-gradient-to-r from-purple-400 to-pink-400 px-4 py-2 rounded-full text-white font-bold tracking-wider shadow-sm">
              第 {qIndex + 1} / {questions.length} 題
            </div>
          </div>
          
          {/* 好感度進度條 */}
          <div className="flex-1 max-w-md mx-8">
            <div className="flex justify-between text-sm text-pink-600 mb-1 font-bold">
              <span>心之距離 (好感度)</span>
              <span>{score}%</span>
            </div>
            <div className="h-4 bg-pink-100 rounded-full overflow-hidden shadow-inner border border-pink-200">
              <div 
                className={`h-full transition-all duration-500 rounded-full ${score >= 80 ? 'bg-pink-400' : score >= 50 ? 'bg-purple-400' : 'bg-blue-400'}`}
                style={{ width: `${score}%` }}
              ></div>
            </div>
          </div>

          {/* 倒數計時 */}
          <div className={`flex items-center gap-2 font-mono text-xl font-bold px-4 py-2 rounded-xl shadow-sm ${timeLeft <= 3 ? 'text-red-500 bg-red-50 animate-pulse border border-red-200' : 'text-purple-600 bg-purple-50 border border-purple-100'}`}>
            <Clock className="w-6 h-6" />
            00:{timeLeft.toString().padStart(2, '0')}
          </div>
        </div>
      );

      // --- 畫面渲染：遊戲開始 ---
      if (gameState === 'start') {
        return (
          <div className="bg-white/80 backdrop-blur-lg w-full max-w-4xl rounded-[2rem] shadow-2xl flex flex-col items-center justify-center relative overflow-hidden border-4 border-white min-h-[600px] p-8">
            <div className="z-10 text-center text-gray-800 max-w-2xl px-6">
              <Heart className="w-24 h-24 mx-auto text-pink-400 mb-6 animate-pulse drop-shadow-md" />
              <h1 className="text-5xl font-black mb-6 tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 drop-shadow-sm">
                社交密室：心之距離
              </h1>
              <p className="text-lg text-gray-600 mb-10 leading-relaxed font-medium bg-white/60 p-6 rounded-2xl shadow-sm border border-pink-100">
                15 道人際界線考驗。<br/>在有限的時間內，判讀空氣、守住界線，<br/>看看你是否能成功走進 K 的內心世界？
              </p>
              <button 
                onClick={startGame}
                className="bg-gradient-to-r from-purple-500 to-pink-400 text-white font-bold text-2xl py-4 px-12 rounded-full shadow-lg hover:shadow-xl transform transition hover:-translate-y-1 active:scale-95 border-2 border-white"
              >
                解鎖心房 (開始遊戲)
              </button>
            </div>
          </div>
        );
      }

      // --- 畫面渲染：遊戲結束結算 ---
      if (gameState === 'end') {
        const isWin = score >= PASS_SCORE;
        return (
          <div className="bg-white/80 backdrop-blur-lg w-full max-w-4xl rounded-[2rem] shadow-2xl flex flex-col items-center justify-center relative overflow-hidden border-4 border-white min-h-[600px] p-8">
            <div className="z-10 text-center text-gray-800 max-w-3xl px-8 py-12 bg-white rounded-3xl border-2 border-pink-100 shadow-lg">
              <div className="w-48 h-48 mx-auto mb-6">
                <Avatar emotion={isWin ? 'happy' : 'sad'} />
              </div>
              <div className="mt-4">
                <h2 className={`text-4xl font-black mb-4 ${isWin ? 'text-pink-500' : 'text-blue-500'}`}>
                  {isWin ? '逃脫成功！成為知心好友' : '逃脫失敗... 關係疏遠'}
                </h2>
                <p className="text-2xl mb-6 text-gray-600 font-bold">最終好感度：<span className={isWin ? 'text-pink-500' : 'text-blue-500'}>{score}%</span></p>
                <p className="text-lg text-gray-600 leading-relaxed mb-10 bg-gray-50 p-6 rounded-2xl">
                  {isWin 
                    ? '太棒了！你完美掌握了身體、時間、隱私與情緒的界線。K 覺得跟你相處非常有安全感，你們建立了一段健康且互相尊重的友誼。' 
                    : '你可能在無意間踩到了對方的界線，或是忽略了非語言的暗示。人際相處需要不斷練習「距離感」，再試一次吧！'}
                </p>
                <button 
                  onClick={startGame}
                  className="bg-gradient-to-r from-purple-400 to-pink-400 text-white font-bold text-xl py-4 px-10 rounded-full transition transform hover:-translate-y-1 active:scale-95 shadow-md border-2 border-white"
                >
                  重新挑戰
                </button>
              </div>
            </div>
          </div>
        );
      }

      const q = questions[qIndex];

      // --- 畫面渲染：遊戲主畫面 ---
      return (
        // 移除固定的 aspect-16-9，改用更彈性的寬螢幕佈局 max-w-6xl + 固定高度區間
        <div className="bg-white w-full max-w-5xl h-[85vh] min-h-[600px] rounded-[2rem] shadow-2xl flex flex-col relative overflow-hidden border-4 border-white ring-1 ring-pink-100">
          <TopBar />
          
          <div className="flex-1 flex overflow-hidden">
            
            {/* 左半邊：角色與情境對話 (淺藍背景) */}
            <div className="w-5/12 bg-blue-50 flex flex-col items-center justify-between relative p-6 border-r-2 border-pink-50">
              
              {/* 情境對話框 */}
              <div className="w-11/12 bg-white border-2 border-blue-100 p-6 rounded-3xl rounded-tl-sm shadow-sm animate-fade-in z-10 mt-4 relative">
                <p className="text-gray-700 text-lg font-medium leading-relaxed tracking-wide">
                  {q.situation}
                </p>
                {/* 對話框小尾巴 */}
                <div className="absolute top-0 left-[-10px] w-0 h-0 border-t-[15px] border-t-white border-l-[15px] border-l-transparent"></div>
              </div>
              
              {/* 動態角色 SVG */}
              <div className="w-full max-w-sm h-[55%] flex justify-center items-end drop-shadow-xl mb-4">
                 <Avatar emotion={currentEmotion} />
              </div>
            </div>

            {/* 右半邊：選項面板與反饋區 (加入自動捲軸 overflow-y-auto) */}
            <div className="w-7/12 p-6 lg:p-10 flex flex-col overflow-y-auto custom-scrollbar bg-pink-50/30">
              
              <div className="min-h-full flex flex-col justify-center">
                {gameState === 'playing' ? (
                  // 答題中：顯示選項
                  <div className="space-y-4 w-full max-w-lg mx-auto animate-fade-in my-auto">
                    <h3 className="text-purple-400 text-sm font-bold mb-4 text-center tracking-widest">— 請在時間內做出回應 —</h3>
                    {q.options.map((opt, idx) => (
                      <button
                        key={idx}
                        onClick={() => handleAnswer(opt)}
                        className="w-full text-left bg-white hover:bg-pink-50 border-2 border-pink-100 hover:border-pink-300 text-gray-700 p-5 rounded-2xl shadow-sm transition-all transform hover:-translate-y-1 active:scale-95 text-lg font-medium tracking-wide leading-snug"
                      >
                        {opt.text}
                      </button>
                    ))}
                  </div>
                ) : (
                  // 答題後：顯示反饋
                  <div className="w-full max-w-lg mx-auto flex flex-col items-center animate-fade-in my-auto">
                    <div className={`w-full p-8 rounded-3xl border-2 mb-8 shadow-sm bg-white ${
                      feedback.type === 'success' ? 'border-green-200' : 'border-rose-200'
                    }`}>
                      <h2 className={`text-2xl font-black mb-4 flex items-center justify-center gap-3 ${
                        feedback.type === 'success' ? 'text-green-500' : 'text-rose-500'
                      }`}>
                        {feedback.delta > 0 ? '✨ 好感度上升' : '💔 好感度下降'}
                      </h2>
                      <p className="text-gray-700 text-lg leading-relaxed text-center font-medium">
                        {feedback.text}
                      </p>
                    </div>
                    
                    <button
                      onClick={nextQuestion}
                      className="w-full max-w-xs py-4 rounded-full font-bold text-xl text-white shadow-md transition transform hover:-translate-y-1 active:scale-95 bg-gradient-to-r from-purple-400 to-pink-400 border-2 border-white"
                    >
                      {qIndex < questions.length - 1 ? '下一題 ➔' : '查看最終結果'}
                    </button>
                  </div>
                )}
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
